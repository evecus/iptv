name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          OUTPUT="iptv-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goarch }}" = "arm" ]; then
            OUTPUT="iptv-${{ matrix.goos }}-armv7"
          fi
          OUTPUT="${OUTPUT}${{ matrix.suffix }}"
          go build \
            -ldflags="-s -w -X main.VERSION=${{ github.event.inputs.tag }}" \
            -o "${OUTPUT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-${{ matrix.goos }}-${{ matrix.goarch }}
          path: iptv-*
          retention-days: 1

  docker:
    name: Docker
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: iptv-linux-*

      - name: Prepare binaries for Docker
        run: |
          mkdir -p docker-bin
          cp dist/iptv-linux-amd64  docker-bin/iptv-linux-amd64
          cp dist/iptv-linux-arm64  docker-bin/iptv-linux-arm64
          cp dist/iptv-linux-armv7  docker-bin/iptv-linux-armv7
          chmod +x docker-bin/*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ github.event.inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest

  release:
    name: Release
    needs: [build, docker]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Git tag
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${{ github.event.inputs.tag }}`,
              sha: context.sha,
            })

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Docker

            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ github.event.inputs.tag }}
            ```

            ## 环境变量

            | 环境变量 | 默认值 | 说明 |
            |---|---|---|
            | `PORT` | `3030` | 监听端口 |
            | `WORKERS` | `20` | 并发测速数 |
            | `TOP` | `5` | 每类型保留最佳源数量 |
            | `INTERVAL` | `6h` | 更新间隔 |
            | `URL1`~`URL20` | — | 自定义订阅源 |
